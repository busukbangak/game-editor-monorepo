<div class="windows-titlebar-container" [style.background-color]="isFocused ? 'rgba(35,35,35, 0.8)' : 'rgba(35,35,35, 0.7)'">
    <div class="menu-container" (click)="showAppMenu($event)">
        <div class="menu-button">
            <svg viewBox="0 0 100 80">
                <rect width="100" height="10"></rect>
                <rect y="30" width="100" height="10"></rect>
                <rect y="60" width="100" height="10"></rect>
            </svg>
        </div>
    </div>

    <div class="content-container">
    </div>
    <div class="window-controls-container">
        <div (click)="minimizeWindow()" class="minimize-window">
            <svg viewBox="0 0 24 24">
                <path d="M20,14H4V10H20" />
            </svg>
        </div>
        <div (click)="minMaxWindow()" class="min-max-window">
            <svg *ngIf="isMaximized" viewBox="0 0 24 24">
                <path d="M4,8H8V4H20V16H16V20H4V8M16,8V14H18V6H10V8H16M6,12V18H14V12H6Z" />
            </svg>
            <svg *ngIf="!isMaximized" viewBox="0 0 24 24">
                <path d="M4,4H20V20H4V4M6,8V18H18V8H6Z" />
            </svg>
        </div>
        <div (click)="closeWindow()" class="close-window">
            <svg viewBox="0 0 24 24">
                <path
                    d="M13.46,12L19,17.54V19H17.54L12,13.46L6.46,19H5V17.54L10.54,12L5,6.46V5H6.46L12,10.54L17.54,5H19V6.46L13.46,12Z" />
            </svg>
        </div>
    </div>
</div>
