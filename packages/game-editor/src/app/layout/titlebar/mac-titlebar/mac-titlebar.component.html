<div class="mac-titlebar-container" [style.background-color]="isFocused ? 'rgba(35,35,35, 0.8)' : 'rgba(35,35,35, 0.7)'">
    <div class="traffic-lights-container">
        <div (click)="closeWindow()" [ngClass]="{ 'close-window': isFocused, 'disabled': !isFocused }">
            <svg *ngIf="isFocused" x="0px" y="0px" viewBox="0 0 6.4 6.4">
                <polygon fill="#4d0000"
                    points="6.4,0.8 5.6,0 3.2,2.4 0.8,0 0,0.8 2.4,3.2 0,5.6 0.8,6.4 3.2,4 5.6,6.4 6.4,5.6 4,3.2">
                </polygon>
            </svg>
        </div>
        <div (click)="minimizeWindow()" [ngClass]="{ 'minimize-window': isFocused && !isFullScreen, 'disabled': !isFocused || isFullScreen}">
            <svg *ngIf="!isFullScreen && isFocused" x="0px" y="0px" viewBox="0 0 8 1.1">
                <rect fill="#995700" width="8" height="1.1"></rect>
            </svg>
        </div>
        <div (click)="minMaxWindow()" [ngClass]="{ 'min-max-window': isFocused, 'disabled': !isFocused }">
            <svg *ngIf="isFocused" x="0px" y="0px" viewBox="0 0 6 5.9">
                <path fill="#006400" d="M5.4,0h-4L6,4.5V0.6C5.7,0.6,5.3,0.3,5.4,0z"></path>
                <path fill="#006400" d="M0.6,5.9h4L0,1.4l0,3.9C0.3,5.3,0.6,5.6,0.6,5.9z"></path>
            </svg>
        </div>
    </div>
    <div class="content-container">
    </div>
    <div class="menu-container">
        <!-- <div class="menu-button" (click)="showAppMenu($event)">
            <svg viewBox="0 0 100 80">
                <rect width="100" height="10"></rect>
                <rect y="30" width="100" height="10"></rect>
                <rect y="60" width="100" height="10"></rect>
            </svg>
        </div> -->
    </div>
</div>
